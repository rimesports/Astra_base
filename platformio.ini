[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube

build_flags =
  -DSTM32F411xE
  -DUSE_HAL_DRIVER
  ; FreeRTOS portable layer include (portmacro.h lives here)
  -I lib/FreeRTOS/Source/portable/GCC/ARM_CM4F
  ; Hardware FPU — must match the ARM_CM4F port and HAL objects
  -mfpu=fpv4-sp-d16
  -mfloat-abi=hard
  ; _printf_float is injected into LINKFLAGS by freertos_flags.py — the ststm32
  ; platform does not forward build_flags to the link step reliably.

; freertos_flags.py injects -mfpu=fpv4-sp-d16 -mfloat-abi=hard into CCFLAGS,
; CXXFLAGS, AND LINKFLAGS.  This is needed because the ststm32 platform
; constructs LINKFLAGS from board spec fields and does not forward build_flags
; to the link step — causing a VFP ABI mismatch at link time.
extra_scripts = freertos_flags.py

; WeAct Black Pill V3.1 — external ST-Link V2 dongle via SWD
; NRST wired: ST-Link RST → Black Pill left header pin 16 (NRST).
; HLA SWD can't do reset-halt atomically, so we use VC_CORERESET:
;   1. connect_assert_srst keeps chip in reset during SWD connect
;   2. halt catches the chip even if it's mid-ISR or in HardFault
;   3. DEMCR.VC_CORERESET ensures halt on very first instruction after reset
;   4. AIRCR SYSRESETREQ does a clean software reset
;   5. second halt catches it at reset vector → flash safely
upload_protocol = stlink
debug_tool = stlink
upload_command = ${PROJECT_DIR}/tools/flash.sh $SOURCE

monitor_speed = 115200
monitor_port  = /dev/ttyACM0

; ─── DFU fallback (no ST-Link needed) ────────────────────────────────────────
; To use: hold BOOT0 button → press & release NRST → release BOOT0 → pio run -e dfu --target upload
[env:dfu]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube
build_flags =
  -DSTM32F411xE
  -DUSE_HAL_DRIVER
  -I lib/FreeRTOS/Source/portable/GCC/ARM_CM4F
  -mfpu=fpv4-sp-d16
  -mfloat-abi=hard
extra_scripts = freertos_flags.py
upload_protocol = dfu
monitor_speed = 115200
monitor_port  = /dev/ttyACM0

[platformio]
default_envs = blackpill_f411ce
