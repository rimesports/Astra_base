[env:nucleo_l476rg]
platform = ststm32
board = nucleo_l476rg
framework = stm32cube

build_flags =
  -DSTM32L476xx
  -DUSE_HAL_DRIVER
  ; FreeRTOS portable layer include (portmacro.h lives here)
  -I lib/FreeRTOS/Source/portable/GCC/ARM_CM4F
  ; Hardware FPU — must match the ARM_CM4F port and HAL objects
  -mfpu=fpv4-sp-d16
  -mfloat-abi=hard
  ; _printf_float is injected into LINKFLAGS by freertos_flags.py — the ststm32
  ; platform does not forward build_flags to the link step reliably.

; freertos_flags.py injects -mfpu=fpv4-sp-d16 -mfloat-abi=hard into CCFLAGS,
; CXXFLAGS, AND LINKFLAGS.  This is needed because the ststm32 platform
; constructs LINKFLAGS from board spec fields and does not forward build_flags
; to the link step — causing a VFP ABI mismatch at link time.
extra_scripts = freertos_flags.py

; Nucleo L476RG has on-board ST-Link/V2-1 — no external probe needed
upload_protocol = stlink
debug_tool = stlink

monitor_speed = 115200
monitor_port  = COM5

[platformio]
default_envs = nucleo_l476rg
