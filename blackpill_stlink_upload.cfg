# blackpill_stlink_upload.cfg
# Custom OpenOCD upload script for WeAct Black Pill STM32F411CEU6.
#
# Problem: HLA SWD (ST-Link) can't do reset-halt atomically.
# Solution: connect with SRST held, catch chip in whatever state it is
#           (even HardFault from a previous debug session), use DEMCR.VC_CORERESET
#           + AIRCR SYSRESETREQ for a clean software reset, halt at reset vector,
#           then flash.

source [find interface/stlink.cfg]
transport select hla_swd

source [find target/stm32f4x.cfg]

# ST-Link V2 clones are more reliable at 480 kHz on Ubuntu/libusb.
adapter speed 480
reset_config srst_only srst_nogate connect_assert_srst

init

# Step 1: halt wherever the CPU is (may be mid-ISR or in HardFault — that's OK)
halt

# Step 2: set VC_CORERESET so the CPU halts on the very first instruction
#         after the next reset (bit 0 of DEMCR at 0xE000EDFC)
mww 0xE000EDFC 0x01000001

# Step 3: trigger a clean software reset via AIRCR.SYSRESETREQ
#         Key = 0x05FA, SYSRESETREQ = bit 2
mww 0xE000ED0C 0x05FA0004
sleep 50

# Step 4: halt at reset vector — CPU is now in a known-good state
halt

# Step 5: flash
flash write_image erase $FIRMWARE

# Step 6: clear VC_CORERESET and resume from the reset vector.
# DO NOT use "reset run" here — it would pulse SRST and cause the STM32 to
# re-sample BOOT0. If BOOT0 is floating high, the chip boots into the system
# bootloader (shows as "STM32 Bootloader" in Device Manager) instead of
# user firmware. The CPU is already at the reset vector, so "resume" is enough.
mww 0xE000EDFC 0x01000000
resume
exit
